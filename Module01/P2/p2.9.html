<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <header></header>
        <main>
            <h1>Nộp hồ sơ ứng tuyển</h1>
            <form action="info" method="post">
                <fieldset>
                    <legend>Thông tin liên hệ</legend>
                    <label for="name">Tên: </label>
                    <input type="text" placeholder="Nhập họ và tên..." />
                    <br />
                    <br />
                    <label for="phone">Số điện thoại: </label>
                    <input pattern="[0][1-9][0-9]{8}" placeholder="0912345678" />
                </fieldset>
                <br />
                <fieldset>
                    <legend>Hồ sơ đính kèm</legend>
                    <label for="upload">Tải lên CV(Định dạng PDF/Word): </label>
                    <input type="file" value="Chọn tệp" />
                    <br />
                    <br />
                </fieldset>
                <br />
                <button type="submit">Nộp hồ sơ</button>
            </form>
        </main>
        <footer></footer>
    </body>
</html>
