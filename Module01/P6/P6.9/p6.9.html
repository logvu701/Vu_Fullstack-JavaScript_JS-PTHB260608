<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Tech Talk</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

        <style>
            .btn-primary {
                --bs-btn-bg: #a61d2d;
                --bs-btn-border-color: #a61d2d;
                --bs-btn-hover-bg: #8c1624;
                --bs-btn-hover-border-color: #8c1624;
                --bs-btn-active-bg: #7a111d;
                --bs-btn-active-border-color: #7a111d;
            }

            .text-primary {
                --bs-primary-rgb: 166, 29, 45;
                color: rgb(var(--bs-primary-rgb)) !important;
            }
        </style>
    </head>

    <body class="bg-light">
        <main class="container py-5">
            <section class="row mx-auto bg-white rounded shadow overflow-hidden" style="max-width: 850px">
                <section class="col-md-5 p-0">
                    <img
                        src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=900"
                        alt="Event"
                        class="img-fluid w-100"
                        style="height: 360px; object-fit: cover"
                    />
                </section>

                <section class="col-md-7 p-4 d-flex flex-column justify-content-center">
                    <h2 class="text-primary fw-bold mb-3" style="font-size: 2rem; line-height: 1.2">Tech Talk: Tương Lai Lập Trình AI</h2>

                    <p class="text-secondary mb-4" style="font-size: 17px">
                        Tham gia cùng Rikkei Academy để khám phá những xu hướng công nghệ AI mới nhất và cách ứng dụng vào phát triển phần mềm trong
                        tương lai.
                    </p>

                    <p class="mb-2">
                        <strong>Thời gian:</strong>
                        09:00 - 12:00, 25/11/2026
                    </p>

                    <p class="mb-4">
                        <strong>Địa điểm:</strong>
                        Cơ sở Rikkei Academy HN
                    </p>

                    <section class="d-flex gap-2">
                        <button class="btn btn-primary px-4 py-2 fw-semibold">Đăng Ký Ngay</button>

                        <button class="btn btn-outline-secondary px-4 py-2">Xem Chi Tiết</button>
                    </section>
                </section>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
