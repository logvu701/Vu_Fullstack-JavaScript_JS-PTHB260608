<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />

        <style>
            .card-img-top {
                height: 220px;
                object-fit: cover;
            }
        </style>

        <title>Sách Nổi Bật</title>
    </head>
    <body>
        <div class="container mt-5">
            <h2 class="text-center mb-4">Sách Nổi Bật</h2>

            <div class="row">
                <div class="col-12 col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=600" class="card-img-top" alt="Book 1" />

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">Hành Trình Về Phương Đông</h5>

                            <p class="card-text">Khám phá những giá trị tâm linh và triết lý sâu sắc của nền văn hóa phương Đông.</p>

                            <a href="#" class="btn btn-primary mt-auto">Mua ngay</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=600" class="card-img-top" alt="Book 2" />

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">Đắc Nhân Tâm</h5>

                            <p class="card-text">Nghệ thuật ứng xử giúp xây dựng các mối quan hệ hiệu quả.</p>

                            <a href="#" class="btn btn-primary mt-auto">Mua ngay</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=600" class="card-img-top" alt="Book 3" />

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">Nhà Giả Kim</h5>

                            <p class="card-text">Câu chuyện truyền cảm hứng về hành trình theo đuổi ước mơ.</p>

                            <a href="#" class="btn btn-primary mt-auto">Mua ngay</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
