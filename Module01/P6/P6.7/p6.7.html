<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book Management</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    </head>
    <body>
        <main class="container py-5">
            <h2 class="text-center mb-4">Danh Sách Sách Kèm Trạng Thái Xóa</h2>

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tên Sách</th>
                        <th>Tác Giả</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Hành Trình Về Phương Đông</td>
                        <td>Baird T. Spalding</td>
                        <td>
                            <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal">Xóa</button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Đắc Nhân Tâm</td>
                        <td>Dale Carnegie</td>
                        <td>
                            <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal">Xóa</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>

        <section class="modal fade" id="deleteModal" tabindex="-1">
            <section class="modal-dialog">
                <section class="modal-content">
                    <header class="modal-header">
                        <h5 class="modal-title text-danger">Xác nhận xóa</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </header>

                    <section class="modal-body">
                        <p>Bạn có chắc chắn muốn xóa cuốn sách này không? Hành động này không thể hoàn tác.</p>
                    </section>

                    <footer class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>

                        <button class="btn btn-danger" data-bs-dismiss="modal">Xác nhận</button>
                    </footer>
                </section>
            </section>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
