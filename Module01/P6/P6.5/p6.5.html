<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thêm Sách Mới</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    </head>
    <body>
        <form class="w-50 mx-auto mt-5 border rounded p-4 shadow-sm">
            <h2 class="text-center mb-4">Thêm Sách Mới</h2>

            <label class="form-label" for="name">Tên sách</label>
            <input type="text" id="name" class="form-control form-control-lg mb-3" placeholder="Nhập tên sách..." />

            <label class="form-label" for="author">Tác giả</label>
            <input type="text" id="author" class="form-control form-control-lg mb-3" placeholder="Nhập tên tác giả..." />

            <label class="form-label" for="category">Thể loại</label>
            <select id="category" class="form-select form-select-lg mb-4">
                <option selected>Chọn thể loại...</option>
                <option>Tiểu thuyết</option>
                <option>Khoa học</option>
                <option>Kinh doanh</option>
            </select>

            <button type="submit" class="btn btn-primary btn-lg w-100">Thêm sách</button>
        </form>
    </body>
</html>
