<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>

        <script src="https://unpkg.com/lucide@latest"></script>

        <title>Dịch Vụ Đi Kèm</title>
    </head>
    <body class="bg-gray-100">
        <section class="max-w-7xl mx-auto px-6 py-12">
            <h1 class="text-4xl font-bold text-center mb-12">Dịch Vụ Đi Kèm</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl transition duration-300 group cursor-pointer">
                    <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center group-hover:bg-blue-600 transition">
                        <i data-lucide="house" class="w-6 h-6 text-blue-600 group-hover:text-white"></i>
                    </div>

                    <h2 class="mt-5 text-2xl font-semibold group-hover:text-blue-600 transition">Khách Sạn</h2>

                    <p class="mt-3 text-gray-500 leading-7">Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl transition duration-300 group cursor-pointer">
                    <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center group-hover:bg-blue-600 transition">
                        <i data-lucide="plane" class="w-6 h-6 text-blue-600 group-hover:text-white"></i>
                    </div>

                    <h2 class="mt-5 text-2xl font-semibold group-hover:text-blue-600 transition">Vé Máy Bay</h2>

                    <p class="mt-3 text-gray-500 leading-7">Đối tác từ các hãng hàng không hàng đầu thế giới.</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl transition duration-300 group cursor-pointer">
                    <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center group-hover:bg-blue-600 transition">
                        <i data-lucide="shield-check" class="w-6 h-6 text-blue-600 group-hover:text-white"></i>
                    </div>

                    <h2 class="mt-5 text-2xl font-semibold group-hover:text-blue-600 transition">Bảo Hiểm</h2>

                    <p class="mt-3 text-gray-500 leading-7">Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.</p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-md hover:shadow-xl transition duration-300 group cursor-pointer">
                    <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center group-hover:bg-blue-600 transition">
                        <i data-lucide="users" class="w-6 h-6 text-blue-600 group-hover:text-white"></i>
                    </div>

                    <h2 class="mt-5 text-2xl font-semibold group-hover:text-blue-600 transition">Hướng Dẫn</h2>

                    <p class="mt-3 text-gray-500 leading-7">Đội ngũ hướng dẫn viên bản địa giàu kinh nghiệm.</p>
                </div>
            </div>
        </section>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
