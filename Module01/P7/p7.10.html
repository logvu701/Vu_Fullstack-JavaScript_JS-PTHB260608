<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TechGadget Admin</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100">
        <div class="min-h-screen flex">
            <aside class="hidden md:flex w-64 bg-slate-950 text-white flex-col p-4">
                <h1 class="text-xl font-bold mb-8">TechGadget Admin</h1>

                <nav class="space-y-2">
                    <a href="#" class="block bg-blue-600 px-4 py-3 rounded-lg"> Tổng quan </a>

                    <a href="#" class="block px-4 py-3 rounded-lg hover:bg-slate-800"> Đơn hàng </a>

                    <a href="#" class="block px-4 py-3 rounded-lg hover:bg-slate-800"> Sản phẩm </a>

                    <a href="#" class="block px-4 py-3 rounded-lg hover:bg-slate-800"> Khách hàng </a>
                </nav>
            </aside>

            <main class="flex-1 p-6">
                <input
                    type="text"
                    placeholder="Tìm kiếm mã đơn hàng, sản phẩm..."
                    class="w-full max-w-md bg-white border border-gray-300 rounded-lg px-4 py-3 mb-6 outline-none focus:ring-2 focus:ring-blue-500"
                />

                <div class="bg-gray-50 rounded-lg p-6 min-h-[600px]">
                    <h2 class="text-3xl font-bold text-gray-800 mb-8">Tổng quan hệ thống</h2>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 text-sm mb-3">Tổng doanh thu</p>

                            <h3 class="text-3xl font-bold text-gray-900">125.000.000 đ</h3>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 text-sm mb-3">Đơn hàng mới</p>

                            <h3 class="text-3xl font-bold text-gray-900">342</h3>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 text-sm mb-3">Khách hàng truy cập</p>

                            <h3 class="text-3xl font-bold text-gray-900">1,204</h3>
                        </div>

                        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                            <p class="text-gray-500 text-sm mb-3">Tỉ lệ chuyển đổi</p>

                            <h3 class="text-3xl font-bold text-gray-900">4.5%</h3>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
