<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Tour Search</title>
    </head>
    <body class="bg-gray-100 flex justify-center items-center min-h-screen">
        <form class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">
            <div class="mb-6">
                <label class="block text-xl font-semibold mb-2"> Điểm đến </label>
                <input type="text" placeholder="Bạn muốn đi đâu?" class="w-full border border-gray-300 rounded-md p-4" />
            </div>

            <div class="mb-6">
                <label class="block text-xl font-semibold mb-2"> Ngày đi </label>
                <input type="date" class="w-full border border-gray-300 rounded-md p-4" />
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white font-semibold text-xl py-4 rounded-md hover:bg-blue-700 transition duration-300"
            >
                Tìm kiếm
            </button>
        </form>
    </body>
</html>
