<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Các Tour Nổi Bật</title>
    </head>
    <body class="bg-gray-100">
        <section class="max-w-6xl mx-auto py-10">
            <h1 class="text-4xl font-bold text-center mb-10">Các Tour Nổi Bật</h1>

            <div class="grid grid-cols-3 gap-8">
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <img
                        src="https://images.unsplash.com/photo-1528181304800-259b08848526?w=800"
                        alt="Thailand"
                        class="w-full h-56 object-cover brightness-110"
                    />

                    <div class="p-4 text-center">
                        <h2 class="text-2xl font-bold">Thái Lan</h2>
                        <p class="text-gray-500">Xứ sở chùa vàng</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <img
                        src="https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=800"
                        alt="Japan"
                        class="w-full h-56 object-cover brightness-110"
                    />

                    <div class="p-4 text-center">
                        <h2 class="text-2xl font-bold">Nhật Bản</h2>
                        <p class="text-gray-500">Hoa anh đào rực rỡ</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <img
                        src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800"
                        alt="France"
                        class="w-full h-56 object-cover brightness-110"
                    />

                    <div class="p-4 text-center">
                        <h2 class="text-2xl font-bold">Pháp</h2>
                        <p class="text-gray-500">Kinh đô ánh sáng</p>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
